
    <div class="breadcrumb">Dashboard</div>

    <!-- ── navigation tiles inside grey box ── -->
    <div class="grey-box tiles-box">
      <div class="nav-tiles">
        <div class="tile active">
          <svg class="tile-icon" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          <div class="tile-label">Member Information</div>
          <div class="tile-arrow"></div>
        </div>
        <div class="tile">
          <svg class="tile-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/><rect x="14" y="3" width="4" height="6" rx="0.5"/></svg>
          <div class="tile-label">Letters</div>
        </div>
        <div class="tile">
          <svg class="tile-icon" viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          <div class="tile-label">Activity</div>
        </div>
        <div class="tile">
          <svg class="tile-icon" viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
          <div class="tile-label">Configuration</div>
        </div>
        <div class="tile">
          <svg class="tile-icon" viewBox="0 0 24 24"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>
          <div class="tile-label">Key Additional Information</div>
        </div>
      </div>
    </div>

    <!-- member info + plans + chart inside grey box -->
    <div class="content-box">
      <!-- two-column body: left data, right chart -->
      <div class="body-grid">

        <!-- LEFT COLUMN -->
        <div class="left-col">

          <!-- member information header -->
          <h3 class="section-title">Member Information</h3>

          <div class="member-stats">
            <div *ngFor="let s of memberStats"
                 class="stat-card"
                 [class.selected]="s.selected">
              <div class="stat-count">{{s.count}}</div>
              <div class="stat-label">{{s.label}}</div>
              <div *ngIf="s.selected" class="stat-arrow"></div>
            </div>
          </div>

          <!-- plans -->
          <h3 class="section-title plans-title">Plans</h3>

          <!-- ROW 1 -->
          <div class="plan-bar-row row-1">
            <div *ngFor="let p of planRow1"
                 class="plan-bar"
                 [class.selected]="p.selected">
              <div class="bar-count">{{p.count}}</div>
              <div class="bar-code">{{p.code}}</div>
            </div>
          </div>

          <!-- status labels row -->
          <div class="status-row">
            <div *ngFor="let s of statusLabels" class="status-cell">
              <div class="status-count">{{s.count}}</div>
              <div class="status-label">{{s.label}}</div>
            </div>
          </div>

          <!-- ROW 2 -->
          <div class="plan-bar-row">
            <div *ngFor="let p of planRow2"
                 class="plan-bar">
              <div class="bar-count">{{p.count}}</div>
              <div class="bar-code">{{p.code}}</div>
            </div>
          </div>
          <!-- ROW 3 -->
          <div class="plan-bar-row">
            <div *ngFor="let p of planRow3"
                 class="plan-bar">
              <div class="bar-count">{{p.count}}</div>
              <div class="bar-code">{{p.code}}</div>
            </div>
          </div>

        </div><!-- /left-col -->

        <!-- RIGHT COLUMN — chart -->
        <div class="right-col">
          <div class="chart-axis">
            <div class="axis-row">
              <span class="axis-label">0.01</span>
              <div class="axis-line"></div>
            </div>
            <div class="axis-row">
              <span class="axis-label">0</span>
              <div class="axis-line short"></div>
            </div>
          </div>

          <div class="donut-wrapper">
            <div class="donut"></div>
          </div>

          <div class="chart-bottom-label">
            <div class="bottom-line"></div>
            <span>99.99</span>
          </div>

          <div class="chart-legend">
            <span class="legend-item"><span class="legend-box blue"></span> Active</span>
            <span class="legend-item"><span class="legend-box red"></span> Future Plan/PBP Change</span>
            <span class="legend-item"><span class="legend-box gold"></span> Future Dis-Enrollment</span>
          </div>
        </div><!-- /right-col -->

      </div><!-- /body-grid -->
    </div><!-- /grey-box -->
